[package]
name = "stryke-mssql"
version = "0.7.0"
description = "Microsoft SQL Server client for stryke. cdylib loaded in-process — query/execute/batch over tiberius (TDS), blocking facade over an embedded tokio runtime, connection cached per (host, db, auth)."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-mssql"
edition = "2026"

[ffi]
lib-name = "stryke_mssql"
namespace = "Mssql"
exports = [
    "mssql__version",
    "mssql__ping",
    "mssql__server_version",
    "mssql__query",
    "mssql__query_one",
    "mssql__scalar",
    "mssql__exists",
    "mssql__execute",
    "mssql__insert",
    "mssql__create_table",
    "mssql__drop_table",
    "mssql__truncate",
    "mssql__simple_query",
    "mssql__batch",
    "mssql__databases",
    "mssql__tables",
    "mssql__columns",
    "mssql__parse_url",
    "mssql__redact_url",
    "mssql__build_url",
    "mssql__quote_ident",
    "mssql__escape_like",
    "mssql__quote_literal",
    "mssql__format_value",
    "mssql__format_in_list",
    "mssql__valid_identifier",
    "mssql__split_batch",
    "mssql__count",
    "mssql__current_database",
    "mssql__foreign_keys",
    "mssql__indexes",
    "mssql__primary_keys",
    "mssql__row_count",
    "mssql__schemas",
    "mssql__table_exists",
    "mssql__views",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
